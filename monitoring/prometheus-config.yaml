global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the FastAPI backend's /metrics endpoint
  - job_name: "chatbot-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          app: "ai-chatbot-backend"

  # Prometheus can also monitor itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
